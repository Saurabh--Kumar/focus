<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Focus Barrier</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <h2>Focus Barrier</h2>

    <section class="section">
      <h3>Add Site</h3>
      <button id="add-current" class="btn btn-primary">Add Current Tab</button>
      <div class="custom-add">
        <input type="text" id="custom-url" placeholder="Or enter URL (e.g., youtube.com)">
        <button id="add-custom" class="btn btn-secondary">Add</button>
      </div>
      <p id="add-status" class="status"></p>
    </section>

    <section class="section">
      <h3>Blocked Sites</h3>
      <ul id="site-list" class="site-list"></ul>
      <p id="empty-msg" class="empty-msg">No sites blocked yet.</p>
    </section>

    <section class="section">
      <h3>Settings</h3>
      <div class="settings-grid">
        <div class="setting-item">
          <label>Work Hours (per day)</label>
          <div id="work-hours-settings"></div>
        </div>
        <div class="setting-item">
          <label>Timer (working hours, min)</label>
          <input type="number" id="timer-working" min="1" max="120">
        </div>
        <div class="setting-item">
          <label>Timer (non-working, sec)</label>
          <input type="number" id="timer-nonworking" min="1" max="300">
        </div>
        <div class="setting-item">
          <label>Access (working hours, min)</label>
          <input type="number" id="access-working" min="1" max="480">
        </div>
        <div class="setting-item">
          <label>Access (non-working, min)</label>
          <input type="number" id="access-nonworking" min="1" max="480">
        </div>
      </div>
      <button id="save-settings" class="btn btn-primary">Save Settings</button>
      <p id="save-status" class="status"></p>
    </section>
  </div>

  <script src="popup.js"></script>
</body>
</html>
