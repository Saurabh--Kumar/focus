<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Focus Barrier — Settings</title>
  <link rel="stylesheet" href="settings.css">
</head>
<body>
  <div class="settings-container">
    <h2>Focus Barrier Settings</h2>

    <section class="section">
      <h3>Blocked Sites</h3>
      <div class="add-site-row">
        <input type="text" id="custom-url" placeholder="Enter URL (e.g., youtube.com)">
        <button id="add-custom" class="btn btn-primary">Add</button>
      </div>
      <p id="add-status" class="status"></p>
      <ul id="site-list" class="site-list"></ul>
      <p id="empty-msg" class="empty-msg">No sites blocked yet.</p>
    </section>

    <section class="section">
      <h3>Work Hours</h3>
      <div id="work-hours-settings"></div>
    </section>

    <section class="section">
      <h3>Timer Durations</h3>
      <div class="setting-item">
        <label>Timer (working hours, min)</label>
        <input type="number" id="timer-working" min="1" max="120">
      </div>
      <div class="setting-item">
        <label>Timer (non-working, sec)</label>
        <input type="number" id="timer-nonworking" min="1" max="300">
      </div>
    </section>

    <section class="section">
      <h3>Access Durations</h3>
      <div class="setting-item">
        <label>Access (working hours, min)</label>
        <input type="number" id="access-working" min="1" max="480">
      </div>
      <div class="setting-item">
        <label>Access (non-working, min)</label>
        <input type="number" id="access-nonworking" min="1" max="480">
      </div>
    </section>

    <button id="save-settings" class="btn btn-primary btn-save">Save Settings</button>
    <p id="save-status" class="status"></p>
  </div>

  <script src="settings.js"></script>
</body>
</html>
